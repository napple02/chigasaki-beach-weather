<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>茅ヶ崎ヘッドランド 気象情報 | STUDIO Style</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* Base Styles */
    body {
      font-family: Inter, "Noto Sans JP", sans-serif;
      background-color: #ffffff;
      color: #222222;
      margin: 0;
      padding: 0;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 32px; /* XXL Spacing */
    }

    /* Typography */
    h1 {
      font-size: 35.04px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: normal;
      text-align: center;
      margin-bottom: 48px; /* XL */
    }

    h2 {
      font-size: 18.72px; /* H3 Feature style */
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 16px;
      color: #222222;
    }

    .mono-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: -0.44px;
      color: #0275fd;
      text-transform: uppercase;
      display: block;
      text-align: center;
      margin-bottom: 8px;
    }

    /* Cards & Surfaces */
    .weather-box {
      background-color: #f7f7f7; /* Surface Light */
      padding: 32px;
      border-radius: 12px;
      margin-bottom: 24px;
    }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: 15.04px;
    }
    .data-row:last-child { border-bottom: none; }

    .data-label {
      color: #707070; /* Text Secondary */
      font-weight: 500;
      font-size: 14px;
      letter-spacing: -0.28px;
    }

    .data-value {
      font-weight: 600;
      color: #222222;
    }

    /* Buttons */
    .toggle-btn {
      background-color: transparent;
      border: 1px solid #222222;
      color: #222222;
      border-radius: 4px; /* Secondary button radius */
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 16px;
    }
    .toggle-btn:hover {
      background-color: #222222;
      color: #f7f7f7;
    }

    .cta-pill {
      display: inline-block;
      background-color: #222222;
      color: #f7f7f7;
      padding: 10px 24px;
      border-radius: 500px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.26px;
      text-decoration: none;
      text-align: center;
    }

    /* Status Badges */
    .warning-badge {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 500px;
      color: #fff;
      margin-right: 8px;
    }
    .badge-tokubetsu { background-color: #8b00ff; }
    .badge-keiho { background-color: #ff4b4b; }
    .badge-chuiho { background-color: #f5a623; }

    /* Utilities */
    .current-time {
      text-align: center;
      font-size: 14px;
      color: #707070;
      margin-bottom: 48px;
      letter-spacing: -0.28px;
    }

    .loading { text-align: center; color: #707070; padding: 40px; }

    #tide-chart-container {
      margin-top: 24px;
      background: #ffffff;
      padding: 16px;
      border-radius: 8px;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      font-size: 12px;
      color: #707070;
    }
    .footer a { color: #0275fd; text-decoration: none; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
  <span class="mono-label">Condition Report</span>
  <h1>茅ヶ崎ヘッドランド</h1>
  <div id="current-time" class="current-time">--:--</div>

  <div id="loading" class="loading">データを読み込んでいます...</div>

  <div id="weather-content" style="display: none;">
    <div class="weather-box">
      <h2>現在の天気</h2>
      <div class="data-row">
        <span class="data-label">気温</span>
        <span class="data-value" id="temp">-- ℃</span>
      </div>
      <div class="data-row">
        <span class="data-label">風速 / 風向</span>
        <span class="data-value"><span id="wind">--</span> m/s (<span id="wind-dir">--</span>)</span>
      </div>
    </div>

    <div class="weather-box">
      <h2>海面コンディション</h2>
      <div class="data-row">
        <span class="data-label">波高</span>
        <span class="data-value" id="wave-height">-- m</span>
      </div>
      <div class="data-row">
        <span class="data-label">海水温</span>
        <span class="data-value" id="sea-temp">-- ℃</span>
      </div>
      
      <div id="tide-list"></div>
      
      <div id="tide-chart-container" style="display:none; height:200px;">
        <canvas id="tideChart"></canvas>
      </div>
    </div>

    <div class="weather-box">
      <h2>気象庁 予報</h2>
      <div id="jma-forecast-content">
        <div class="data-row">
          <span class="data-label">今日の天気</span>
          <span class="data-value" id="jma-weather">--</span>
        </div>
        <div class="data-row">
          <span class="data-label">降水確率</span>
          <span class="data-value" id="jma-pop">--</span>
        </div>
        <button id="jma-overview-toggle" class="toggle-btn" onclick="toggleOverview()">概況を表示 ▼</button>
        <div id="jma-overview-text" style="display:none; font-size:14px; margin-top:16px; color:#444; white-space:pre-wrap;"></div>
      </div>
    </div>

    <div class="weather-box" id="jma-warning-section">
      <h2>警報・注意報</h2>
      <div id="jma-warning-content"></div>
    </div>
  </div>

  <div class="footer">
    <p>Data provided by Open-Meteo & JMA</p>
    <a href="#" class="cta-pill">最新の状態に更新</a>
  </div>
</div>

<script>
  // --- 基本設定とAPI連携 (既存ロジックを継承し、デザイン部分のみ調整) ---
  let tideChartInstance = null;

  // Chart.jsのカラー設定をブランドカラー (#0275fd) に変更
  function drawTideChart(extremes, hasHeightData) {
    const chartContainer = document.getElementById('tide-chart-container');
    chartContainer.style.display = 'block';
    const ctx = document.getElementById('tideChart').getContext('2d');

    // ... (補間ロジックは既存のものを利用) ...
    // ※以下、カラー指定部分を修正
    tideChartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          borderColor: '#0275fd', // STUDIO Blue
          backgroundColor: 'rgba(2, 117, 253, 0.05)',
          borderWidth: 2,
          pointBackgroundColor: pointColors,
          fill: true,
          tension: 0.4
          // ...
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { 
          x: { display: false },
          y: { display: false } 
        }
      }
    });
  }

  // ※その他の fetchWeatherData, fetchJmaForecast 等の関数は、
  // ID名をHTMLと整合させてそのまま移植してください。
</script>
</body>
</html>
